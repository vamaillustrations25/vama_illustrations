<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: 'Georgia', serif;
      background-color: #fff8ef;
      color: #381a12;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(75, 30, 18, 0.05);
      border: 1px solid rgba(75, 30, 18, 0.1);
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(247, 209, 138, 0.3);
      padding-bottom: 20px;
    }
    .header h1 {
      color: #381a12;
      font-size: 24px;
      margin: 0;
    }
    .header p {
      color: #8c4b26;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-top: 5px;
    }
    .content {
      font-family: 'Arial', sans-serif;
      line-height: 1.6;
      color: #5f2b19;
    }
    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 12px;
      color: #8c4b26;
      border-top: 1px solid rgba(247, 209, 138, 0.3);
      padding-top: 20px;
    }
  </style>
</head>
<body>
  <div style="padding: 40px 20px;">
    <div class="container">
      <div class="header">
        <h1>Vama Illustrations</h1>
        <p>Indian Wedding Studio</p>
      </div>
      
      <div class="content">
        <!-- Edit the content below for your mailing -->
        <p>Dear {{ name }},</p>
        
        <p>{{ message_body }}</p>
        
        <p>Best regards,<br>Vama Studio Team</p>
      </div>

      <div class="footer">
        <p>&copy; 2026 Vama Illustrations. All rights reserved.</p>
      </div>
    </div>
  </div>
</body>
</html>
